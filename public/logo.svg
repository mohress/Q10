<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Background Superellipse -->
  <rect x="32" y="32" width="448" height="448" rx="112" fill="url(#bg-grad)" />
  
  <!-- Outer ring glow -->
  <rect x="32" y="32" width="448" height="448" rx="112" fill="none" stroke="url(#ring-grad)" stroke-width="8" opacity="0.4" />
  
  <!-- Central Lightning Bolt inside circular badge -->
  <g transform="translate(144, 112)">
    <!-- Circuit lines in background -->
    <path d="M 40 200 L 40 140 C 40 100, 184 100, 184 140 L 184 200" fill="none" stroke="#60a5fa" stroke-width="8" stroke-dasharray="8 6" stroke-linecap="round" opacity="0.4" />
    <circle cx="40" cy="200" r="10" fill="#60a5fa" opacity="0.6" />
    <circle cx="184" cy="200" r="10" fill="#60a5fa" opacity="0.6" />
    
    <!-- Central Lightning Bolt -->
    <path d="M120 0 L20 150 L100 150 L80 280 L200 120 L120 120 Z" fill="url(#bolt-grad)" filter="url(#glow)" />
  </g>
  
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e1b4b" />
    </linearGradient>
    <linearGradient id="ring-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#6366f1" />
    </linearGradient>
    <linearGradient id="bolt-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="60%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#1d4ed8" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
</svg>
